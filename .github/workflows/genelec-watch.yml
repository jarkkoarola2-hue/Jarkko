name: Genelec Watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_genelec_watch_full_auto.txt

      - name: Run script
        run: python genelec_watch_full_auto.py

      - name: Commit seen items
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add seen_genelec_items.json || true
          git commit -m "update seen items" || true
          git push
