name: Genelec Watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_genelec_watch_full_auto.txt

      - name: Run script
        run: python genelec_watch_full_auto.py
print("TESTI: lähetetään WhatsApp viesti")

import os
from twilio.rest import Client

if os.getenv("ENABLE_WHATSAPP") == "true":
    client = Client(os.getenv("TWILIO_SID"), os.getenv("TWILIO_AUTH"))
    
    client.messages.create(
        body="TESTI OK ✅ Genelec vahti toimii!",
        from_=os.getenv("WHATSAPP_FROM"),
        to=os.getenv("WHATSAPP_TO")
    )
